<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#63c9a8"/>
      <stop offset="100%" stop-color="#359373"/>
    </linearGradient>
    <clipPath id="rounded">
      <rect width="1024" height="1024" rx="228" ry="228"/>
    </clipPath>
  </defs>
  <g clip-path="url(#rounded)">
    <rect width="1024" height="1024" fill="url(#bg)"/>
    <!-- Outer pyramid layer -->
    <polygon points="512,180 880,800 144,800" fill="rgba(255,255,255,0.22)"/>
    <!-- Middle pyramid layer -->
    <polygon points="512,320 780,720 244,720" fill="rgba(255,255,255,0.40)"/>
    <!-- Inner solid core -->
    <polygon points="512,450 690,650 334,650" fill="rgba(255,255,255,0.95)"/>
  </g>
</svg>
