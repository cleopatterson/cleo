name: Cleo
options:
  bundleIdPrefix: com.wallboard
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

configFiles:
  Debug: Config/Secrets.xcconfig
  Release: Config/Secrets.xcconfig

settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: V4NUPMNDU4

targets:
  Cleo:
    type: application
    platform: iOS
    sources:
      - path: Cleo
      - path: Data/time-summary.json
        buildPhase: resources
        type: file
    resources:
      - path: Cleo/Resources
    settings:
      base:
        INFOPLIST_GENERATION_MODE: GeneratedByXcode
        PRODUCT_BUNDLE_IDENTIFIER: com.wallboard.cleo
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Cleo/Cleo.entitlements
    info:
      path: Cleo/Info.plist
      properties:
        CFBundleDisplayName: Cleo
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CLAUDE_API_KEY: "$(CLAUDE_API_KEY)"
        UILaunchScreen:
          UIColorName: AccentColor
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSCalendarsUsageDescription: "Cleo needs calendar access to show your business events"
        NSCalendarsFullAccessUsageDescription: "Cleo needs full calendar access to create and manage your business events"
        NSCameraUsageDescription: "Cleo uses your camera to scan expense receipts"
        NSPhotoLibraryUsageDescription: "Cleo can import receipt photos from your library"
        UIBackgroundModes:
          - remote-notification
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - cleo

  CleoShare:
    type: app-extension
    platform: iOS
    sources:
      - path: CleoShare
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wallboard.cleo.share
        INFOPLIST_GENERATION_MODE: GeneratedByXcode
        CODE_SIGN_ENTITLEMENTS: CleoShare/CleoShare.entitlements
    info:
      path: CleoShare/Info.plist
      properties:
        CFBundleDisplayName: Cleo
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).ShareViewController"
          NSExtensionActivationRule:
            NSExtensionActivationSupportsFileWithMaxCount: 1
            NSExtensionActivationSupportsImageWithMaxCount: 1
    dependencies:
      - target: Cleo
        embed: false
