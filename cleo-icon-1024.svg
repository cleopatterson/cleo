<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#63c9a8"/>
      <stop offset="100%" stop-color="#359373"/>
    </linearGradient>
    <clipPath id="rounded">
      <rect width="1024" height="1024" rx="228" ry="228"/>
    </clipPath>
  </defs>
  <g clip-path="url(#rounded)">
    <rect width="1024" height="1024" fill="url(#bg)"/>
    <!-- Outer pyramid layer -->
    <polygon points="512,136 938,819 86,819" fill="rgba(255,255,255,0.12)"/>
    <!-- Middle pyramid layer -->
    <polygon points="512,290 785,699 239,699" fill="rgba(255,255,255,0.22)"/>
    <!-- Inner solid core -->
    <polygon points="512,426 666,614 358,614" fill="rgba(255,255,255,0.92)"/>
  </g>
</svg>
