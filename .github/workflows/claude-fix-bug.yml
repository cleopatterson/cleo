name: Claude Code Bug Fix

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

jobs:
  auto-fix:
    if: github.event_name == 'issues' && github.event.label.name == 'bug-report'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Auto-fix bug with Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          label_trigger: "bug-report"
          base_branch: main
          branch_prefix: fix/
          claude_args: "--max-turns 25 --model claude-sonnet-4-6 --dangerously-skip-permissions"
          show_full_output: true
          prompt: |
            Fix the bug described in GitHub issue #${{ github.event.issue.number }}: "${{ github.event.issue.title }}"

            Issue body:
            ${{ github.event.issue.body }}

            Key facts: SwiftUI iOS 17+, @Observable/@Bindable, Core Data (NSPersistentCloudKitContainer).
            Read CLAUDE.md for full project conventions before making changes.
            Keep the fix minimal. Build with: xcodebuild -project Cleo.xcodeproj -scheme Cleo -destination 'platform=iOS Simulator,name=iPhone 16' build
            Create a branch prefixed with fix/ and open a pull request.

  comment-fix:
    if: github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Respond to @claude mention
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          trigger_phrase: "@claude"
          claude_args: "--max-turns 25 --model claude-sonnet-4-6 --dangerously-skip-permissions"
          show_full_output: true
